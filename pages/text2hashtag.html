<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String to Hashtag Tool</title>
    <link rel="icon" href="#">
    <link rel="stylesheet" href="../css/text2hashtag.css">
</head>

<body>

    <aside id="sidebar">
        <div id="sidebar-actions">
            <div>
                <input type="text" id="searchInput" placeholder="Search terms..." />
                <button id="clearSearch">Clear</button>
            </div>

            <div>
                <button id="editModeBtn">Edit</button>
                <button id="deleteModeBtn">Delete</button>
            </div>

            <div>
                <button id="exportBtn">Export Terms</button>
                <input type="file" id="importFile" hidden />
                <button id="importBtn">Import Terms</button>
            </div>

            <div>
                <button class="tooltip">Info
                    <span class="tooltiptext">
                        <p>A simple tool I made to format hashtags for my posts!</p>
                        <p>I create frequently used groups (stored locally) based on subject and category, such
                            as "dog 犬" and "art drawing". When processed, it becomes "#dog
                            #犬 #art #drawing" for usage.
                        </p>
                    </span>
                </button>
            </div>
        </div>

        <div id="groups"></div>
    </aside>

    <main>
        <h1><a href="../index.html">String to Hashtag Tool</a></h1>

        <section id="input-section">
            <textarea id="inputText" rows="5" placeholder="Enter terms here..."></textarea>

            <div id="input-buttons">
                <button id="runBtn">Process 0 words</button>
                <button id="copyBtn">Copy All</button>
                <button id="clearBtn">Clear</button>
            </div>
        </section>

        <section class="result" id="output"></section>
    </main>

    <script src="../js/text2hashtag.js"></script>
</body>

</html>
