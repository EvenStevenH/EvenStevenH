<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String to Hashtag Tool</title>
    <link rel="stylesheet" href="../css/text2hashtag.css">
</head>

<body>
    <h1><a href="../index.html">String to Hashtag Tool</a></h1>

    <section id="input-section">
        <textarea id="inputText" rows="5" placeholder="Enter your text here..."></textarea>

        <div id="buttons-container">
            <button id="runBtn">Process 0 words</button>
            <button id="copyBtn">Copy All</button>
        </div>
    </section>


    <section class="result" id="output"></section>

    <script src="../js/text2hashtag.js"></script>
</body>

</html>
